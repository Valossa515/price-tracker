# Dev-only overlay: starts a local AWS emulator (floci) alongside the
# existing postgres + mailhog services from ../docker-compose.yml.
#
# Usage (from repo root):
#   docker compose -f docker-compose.yml -f infra/docker-compose.dev.yml up -d
#   ./infra/floci-bootstrap.sh           # provisions Cognito pool/client/scope
#   eval "$(./infra/floci-bootstrap.sh --export)"   # exports COGNITO_* + CLIENT_* envs
#   mvn spring-boot:run                  # app reads COGNITO_ISSUER_URI=http://localhost:4566/...
#
# Floci is a free MIT-licensed AWS local emulator (LocalStack-compatible API,
# no auth token required). Covers Cognito user pools + JWKS, SSM, IAM, S3,
# SQS, SNS, KMS, Secrets Manager, etc.

services:
  floci:
    image: floci/floci:latest
    container_name: price-tracker-floci
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      FLOCI_DEFAULT_REGION: us-east-1
      FLOCI_DEFAULT_ACCOUNT_ID: "000000000000"
      FLOCI_STORAGE_MODE: persistent
      FLOCI_STORAGE_PERSISTENT_PATH: /app/data
    volumes:
      - floci_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_floci/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  floci_data:
