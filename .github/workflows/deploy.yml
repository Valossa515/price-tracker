name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy (audit trail)"
        required: false
        default: "manual trigger"

# Concurrency: cancela deploy em andamento se um novo push chega
concurrency:
  group: deploy-production
  cancel-in-progress: false # NÃO cancela: deixa terminar pra não corromper estado

permissions:
  id-token: write   # OIDC: necessário pra GitHub emitir token
  contents: read    # checkout do código

env:
  AWS_REGION: sa-east-1
  ECR_REGISTRY: 941098798253.dkr.ecr.sa-east-1.amazonaws.com
  ECR_REPOSITORY: price-tracker
  EC2_TAG_NAME: price-tracker-app
  SSM_VERSION_PARAM: /pricetracker/app/version

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-24.04-arm  # ARM64 nativo, mesma arch da EC2 (sem QEMU)
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR
        run: mvn -B -q clean package -DskipTests

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::941098798253:role/price-tracker-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build & push Docker image
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ steps.tag.outputs.tag }}"
          docker build --platform linux/arm64 -t "$IMAGE" .
          docker push "$IMAGE"
          echo "Pushed: $IMAGE"

      - name: Update SSM app version parameter
        run: |
          aws ssm put-parameter \
            --name "$SSM_VERSION_PARAM" \
            --type String \
            --value "${{ steps.tag.outputs.tag }}" \
            --overwrite \
            --output text > /dev/null
          echo "SSM $SSM_VERSION_PARAM = ${{ steps.tag.outputs.tag }}"

      - name: Resolve EC2 instance ID
        id: ec2
        run: |
          IID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${EC2_TAG_NAME}" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text | awk '{print $1}')
          if [ -z "$IID" ]; then
            echo "::error::No running EC2 found with tag Name=${EC2_TAG_NAME}"
            exit 1
          fi
          echo "iid=$IID" >> "$GITHUB_OUTPUT"
          echo "Target instance: $IID"

      - name: Trigger deploy on EC2 via SSM
        id: ssm
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.iid }}" \
            --document-name "AWS-RunShellScript" \
            --comment "GH Actions deploy ${{ steps.tag.outputs.tag }}" \
            --parameters '{"commands":[
              "set -e",
              "cd /opt/price-tracker",
              "NEW_VERSION=$(aws ssm get-parameter --region '"${AWS_REGION}"' --name '"${SSM_VERSION_PARAM}"' --query Parameter.Value --output text)",
              "sed -i \"s|'"${ECR_REPOSITORY}"':[a-zA-Z0-9._-]*|'"${ECR_REPOSITORY}"':${NEW_VERSION}|\" docker-compose.yml",
              "aws ecr get-login-password --region '"${AWS_REGION}"' | docker login --username AWS --password-stdin '"${ECR_REGISTRY}"'",
              "docker compose pull app",
              "docker compose up -d app",
              "docker compose ps"
            ]}' \
            --query 'Command.CommandId' \
            --output text)
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "SSM Command ID: $CMD_ID"

      - name: Wait for SSM command completion
        run: |
          for i in $(seq 1 40); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm.outputs.cmd_id }}" \
              --instance-id "${{ steps.ec2.outputs.iid }}" \
              --query 'Status' --output text 2>/dev/null || echo Pending)
            echo "[$i/40] Status: $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "::error::SSM deploy failed with status $STATUS"
                aws ssm get-command-invocation \
                  --command-id "${{ steps.ssm.outputs.cmd_id }}" \
                  --instance-id "${{ steps.ec2.outputs.iid }}" \
                  --query 'StandardErrorContent' --output text
                exit 1 ;;
            esac
            sleep 5
          done
          echo "::error::Timed out waiting for SSM command"
          exit 1

      - name: Show deploy output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.cmd_id }}" \
            --instance-id "${{ steps.ec2.outputs.iid }}" \
            --query 'StandardOutputContent' --output text || true

      - name: Smoke test
        run: |
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://littlepricetracker.observer/actuator/health || echo "000")
            echo "[$i/12] /actuator/health → $CODE"
            if [ "$CODE" = "200" ]; then
              echo "Deploy verified ✓"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Smoke test failed — health endpoint not returning 200"
          exit 1
