spring:
  application:
    name: price-tracker

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_AUTH:false}
          starttls:
            enable: ${MAIL_TLS:false}
        connection-timeout: 5000
        timeout: 5000

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI}

  courier:
    retry:
      enabled: true
      max-attempts: 3
      delay-ms: 200
      multiplier: 2.0
    cache:
      enabled: true
      ttl-seconds: 300
      max-size: 500
    idempotency:
      enabled: true
      max-size: 1000

cognito:
  user-pool-id: ${COGNITO_USER_POOL_ID:}
  region: ${COGNITO_REGION:us-east-1}

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

app:
  pricecheck:
    cron: "0 0 * * * *"
  mail:
    from: ${MAIL_FROM}
  marketplace:
    allowed-hosts:
      - mercadolivre.com.br
      - produto.mercadolivre.com.br
      - www.amazon.com.br
      - amazon.com.br
      - shopee.com.br
      - www.shopee.com.br
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200}
  consent:
    documents:
      PRIVACY_POLICY:
        version: ${CONSENT_PRIVACY_VERSION:v1}
        title: Política de Privacidade
        url: ${CONSENT_PRIVACY_URL:https://littlepricetracker.observer/legal/privacy-v1.html}
      TERMS_OF_USE:
        version: ${CONSENT_TERMS_VERSION:v1}
        title: Termos de Uso
        url: ${CONSENT_TERMS_URL:https://littlepricetracker.observer/legal/terms-v1.html}

logging:
  level:
    root: INFO
    org.springframework.security: WARN
    io.github.valossa515.pricetracker: DEBUG
